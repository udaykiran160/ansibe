- name : variables from prompt
  hosts: local
  connection : local
  vars_promt :
    - name : username 
      prompt : What is your name?
      private : false
    - name : password
      prompt : What is your password ?
      private : true
  tasks : 
    - name : print the variables 
      ansible.builtin.debug :
        msg : "user name is {{username}}, password is {{password}} "