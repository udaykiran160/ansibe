- name: functions
  hosts: local
  connection: local
  vars: 
    technologies: Devops, Linux, shell, Ansible
    dict:
      Application: payment
      Environment: dev
    list:
      - key: Application
        value: payment
      - key: Environment
        value: dev

  tasks: 
  - name: convert string to list
    ansible.builtin.debug:
      msg: "{{technologies | split(',')}}"

  - name: converting dict to list
    ansible.builtin.debug:
      msg: "{{dict | dict2items }}"

  - name: converting list to dict / map
    ansible.builtin.debug:
      msg: "{{dict | item2diccts }}"
