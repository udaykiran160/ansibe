- name: gathering facts in ansible
  hosts: local
  connection: local
  become: yes
  tasks: 
  - name: installed
    ansible.builtin.package:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
    loop:
      - { name: "nginx" , state: "present"}
      - { name: "mysql" , state: "present"}
