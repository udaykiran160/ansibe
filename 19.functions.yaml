- name: functions
  hosts: local
  connection: local
  vars: 
    technologies: Devops, Linux, shell, Ansible
    name: Uday Kiran Naidu
    gmail: UdayIrANnaidu@gmail.com
    ipaddress: "19222.168.0.1"
    dict:
      Application: payment
      Environment: dev
    list:
      - key: Application
        value: payment
      - key: Environment
        value: dev

  tasks: 
  - name: convert string to list
    ansible.builtin.debug:
      msg: "{{technologies | split(',')}}"

  - name: converting dict to list
    ansible.builtin.debug:
      msg: "{{dict | dict2items }}"

  - name: converting list to dict 
    ansible.builtin.debug:
      msg: "{{ list | items2dict }}"

  - name: read the yaml and store in the variable
    ansible.builtin.set_fact:
      student_yaml: "{{lookup('file','student.yaml') | from_yaml}}"

  - name: convert yaml to json
    ansible.builtin.debug:
      msg: "json:{{ student_yaml | to_json}}"

  - name: save json to file 
    ansible.builtin.copy:
      dest: ./student_data.json
      content: "{{ student_yaml | to_nice_json }}"

  - name: convert to upper
    ansible.builtin.debug:
      msg: "{{name | upper  }}"

  - name: convert to lower 
    ansible.builtin.debug:
      msg: "{{ gmail | lower }}"
  
  - name: check IP is valid or not
    ansible.builtin.debug: 
      msg: "{{ ipaddress | ansible.utils.ipv4 }}"

  # - name: grep for root 
  #   ansible.builtin.shell: cat /etc/passwd | grep root
  #   registor: command_output

  - name: grep for root
    #ansible.builtin.command: cat /etc/passwd | grep root
    ansible.builtin.shell: cat /etc/passwd | grep root
    register: command_output


  - name: print the command_output
    ansible.builtin.debug:
      msg: "{{ command_output }}"


  - name: redirect the command_output
    ansible.builtin.shell: ls -ltr > /tmp/output.txt
    register: redirect_output

  - name: print the redirect_output
    ansible.builtin.debug: 
      msg: "{{ redirect_output}}"